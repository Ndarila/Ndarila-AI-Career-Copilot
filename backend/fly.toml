# Fly.io configuration for NdarilaAI Career Copilot Backend

app = "backend-ambergris-horizon-7627"

primary_region = "jnb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024